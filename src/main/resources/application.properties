spring.application.name=intern-engine

# Server port configuration
server.port=8080

# PostgreSQL Connection String
spring.datasource.url=jdbc:postgresql://localhost:5432/intern-engine
spring.datasource.username=postgres
spring.datasource.password=example
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=change-this-to-a-long-random-base64-secret-before-production
jwt.expiration-ms=86400000

# Claude API
claude.api.key=your_claude_api_key_here
claude.api.url=https://api.anthropic.com/v1/messages
claude.model=claude-sonnet-4-6
